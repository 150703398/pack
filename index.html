<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工业级装箱系统（拖挂/货物分开）</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<h1>工业级装箱系统（拖挂/货物分开）</h1>

<div class="controls">
    <label>单位:
        <select id="unitSelect">
            <option value="m">米 (m)</option>
            <option value="cm">厘米 (cm)</option>
            <option value="inch">英寸 (inch)</option>
        </select>
    </label>

    <button id="addContainer">添加车厢</button>
    <button id="addItem">添加货物</button>
    <button id="addDrag">添加拖挂</button>

    <label>选择车厢:
        <select id="selectContainer"></select>
    </label>

    <label>
        <input type="checkbox" id="useDrag"> 使用拖挂
    </label>

    <button id="runPacking">开始装箱</button>
    <span id="utilization"></span>
</div>

<div class="lists">
    <div class="containersList">
        <h2>车厢列表</h2>
        <ul id="containersUl"></ul>
    </div>
    <div class="itemsList">
        <h2>货物列表</h2>
        <ul id="itemsUl"></ul>
    </div>
    <div class="dragList">
        <h2>拖挂列表</h2>
        <ul id="dragUl"></ul>
    </div>
</div>

<div id="viewer" style="width:100%; height:600px; background:#eee;"></d
