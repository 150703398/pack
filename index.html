<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工业级多车厢装箱系统（升级版）</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<h1>工业级多车厢装箱系统（升级版）</h1>

<div class="controls">
    <label>单位:
        <select id="unitSelect">
            <option value="m">米 (m)</option>
            <option value="cm">厘米 (cm)</option>
            <option value="inch">英寸 (inch)</option>
        </select>
    </label>

    <button id="addContainer">添加车厢</button>
    <button id="addItem">添加货物/拖挂</button>

    <label>装箱模式:
        <select id="modeSelect">
            <option value="direct">直接装箱</option>
            <option value="drag_only">只装拖</option>
            <option value="drag_first">先装拖后箱</option>
            <option value="custom">自由搭配</option>
        </select>
    </label>
    <button id="runPacking">开始装箱</button>
    <span id="utilization"></span>
</div>

<div class="lists">
    <div class="containersList">
        <h2>车厢列表</h2>
        <ul id="containersUl"></ul>
    </div>
    <div class="itemsList">
        <h2>货物列表</h2>
        <ul id="itemsUl"></ul>
    </div>
    <div class="dragList">
        <h2>拖挂列表</h2>
        <ul id="dragUl"></ul>
    </div>
</div>

<div>
<h3>推荐车厢：</h3>
<span id="recommendedContainer"></span>
</div>

<div id="viewer" style="width:100%; height:600px; background:#eee;"></div>

<script src="main.js"></script>
</body>
</html>
