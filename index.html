<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工业级最优货物装箱系统</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<h1>工业级最优货物装箱系统</h1>

<div class="controls">
    <label>车厢尺寸 (W×H×D):
        <input id="containerWidth" type="number" value="10"> ×
        <input id="containerHeight" type="number" value="5"> ×
        <input id="containerDepth" type="number" value="5">
    </label>
    <label>装箱模式:
        <select id="modeSelect">
            <option value="direct">直接装箱</option>
            <option value="drag_only">只装拖</option>
            <option value="drag_first">先装拖后箱</option>
        </select>
    </label>
    <button id="addItem">添加货物</button>
    <button id="runPacking">开始装箱</button>
    <span id="utilization"></span>
</div>

<div class="itemsList">
    <h2>货物列表</h2>
    <ul id="itemsUl"></ul>
</div>

<div id="viewer" style="width:100%; height:500px; background:#eee;"></div>

<script src="main.js"></script>
</body>
</html>
